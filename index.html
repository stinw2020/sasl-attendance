    function setLibraryLocation() {
      let msgBox = document.getElementById("locSaveMsg");
      msgBox.innerHTML = "<span style='color:#0f131c;'>Warming up GPS hardware... Please wait (10s) 🛰️</span>";
      
      if(!navigator.geolocation) {
          msgBox.innerHTML = "<span style='color:#c0392b;'>GPS Permission Denied!</span>";
          return;
      }

      // 🎯 GPS DRIFT FIX: Hum 7 second tak best location record karenge
      let bestAccuracy = 9999;
      let bestLat = 0, bestLng = 0;
      let attemptCount = 0;

      let geoWatchId = navigator.geolocation.watchPosition(
          (pos) => {
              attemptCount++;
              // Agar accuracy (meter me) kam hai, matlab location zyada accurate hai
              if (pos.coords.accuracy < bestAccuracy) {
                  bestAccuracy = pos.coords.accuracy;
                  bestLat = pos.coords.latitude;
                  bestLng = pos.coords.longitude;
              }
              msgBox.innerHTML = `<span style='color:#3498db;'>Refining Accuracy: ${Math.round(bestAccuracy)} meters... (Attempt ${attemptCount}) ⏳</span>`;
          },
          (err) => {
              msgBox.innerHTML = "<span style='color:#c0392b;'>GPS Error! Try standing outside.</span>";
          },
          { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
      );

      // 7 seconds ke baad best result ko save karenge
      setTimeout(() => {
          navigator.geolocation.clearWatch(geoWatchId); 

          if (bestLat !== 0 && bestLng !== 0) {
              msgBox.innerHTML = `<span style='color:#0f131c;'>Saving Location with ${Math.round(bestAccuracy)}m Accuracy...</span>`;
              
              callBackend("saveLibraryLocation", { lat: bestLat, lng: bestLng }, res => { 
                  if(res.success) {
                      msgBox.innerHTML = "<span style='color:#27ae60; font-size:16px;'>" + res.message + " ✅</span>"; 
                  } else {
                      msgBox.innerHTML = "<span style='color:#c0392b;'>Backend Error: " + res.message + " ❌</span>";
                  }
              });
          } else {
              msgBox.innerHTML = "<span style='color:#c0392b;'>Location lock failed! Check your GPS. ❌</span>";
          }
      }, 7000); 
    }

    function verifyLocationAndMark(decodedText, retryCount = 0) {
      if (decodedText.trim() !== currentSecretQR) {
         document.getElementById("attMsg").innerHTML = "<span style='color:#c0392b;'>Invalid QR Code!</span>"; 
         return; 
      }

      let msgBox = document.getElementById("attMsg");
      if (retryCount === 0) msgBox.innerHTML = "<span style='color:#0f131c;'>Verifying GPS... 🛰️</span>";
      
      navigator.geolocation.getCurrentPosition(pos => {
        let dist = getDistance(pos.coords.latitude, pos.coords.longitude, libLat, libLng);
        
        // 🎯 Yahan 15 meters ka limit set hai
        if(dist <= 15) {
            msgBox.innerHTML = "<span style='color:#0f131c;'>Location Verified! Marking...</span>";
            callBackend("markSmartAttendance", {id: studentData.id, name: studentData.name, mob: studentData.mobile, remark: "Verified <15m"}, res => {
              if(res.success) msgBox.innerHTML = "<span style='color:#27ae60; font-size:16px;'>" + res.message + " ✅</span>";
              else msgBox.innerHTML = "<span style='color:#c0392b;'>" + res.message + "</span>";
            });
        } 
        else if (retryCount < 3) {
            setTimeout(() => { verifyLocationAndMark(decodedText, retryCount + 1); }, 1200);
        } 
        else {
            msgBox.innerHTML = "<span style='color:#c0392b;'>Range Error: " + Math.round(dist) + "m away (Allowed: 15m).</span>";
        }
      }, err => {
        if (retryCount < 3) { setTimeout(() => { verifyLocationAndMark(decodedText, retryCount + 1); }, 1200); } 
        else { msgBox.innerHTML = "<span style='color:#c0392b;'>GPS Error: Signal weak!</span>"; }
      }, { enableHighAccuracy: true, timeout: 6000, maximumAge: 0 }); 
    }
